<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sysml-blocks</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header id="topbar">
  <div class="brand"><span class="brand-mark"></span>sysml-blocks</div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search model…  ( / )"
           aria-label="Search model" autocomplete="off" spellcheck="false">
    <button id="search-regex" class="search-toggle" title="Regular expression" aria-pressed="false">.*</button>
    <button id="search-case" class="search-toggle" title="Case sensitive" aria-pressed="false">Aa</button>
    <button id="search-fields-btn" class="search-toggle" title="Search fields"
            aria-haspopup="true" aria-expanded="false">Fields ▾</button>
    <div id="search-fields-menu" hidden></div>
    <div id="search-panel" role="listbox" aria-label="Search results" hidden></div>
  </div>
  <div class="topbar-right">
    <span id="root-path" class="root-path"></span>
    <button id="export-pdf" class="btn" title="Export model as PDF">Export PDF</button>
    <button id="refresh" class="btn" title="Re-index the mapped volume">Refresh</button>
  </div>
</header>
<div id="layout">
  <nav id="sidebar" aria-label="Model files">
    <div class="side-title">Files</div>
    <ul id="file-list"></ul>
    <button id="new-file" class="btn btn-ghost">New file…</button>
  </nav>
  <main id="canvas" tabindex="-1"></main>
</div>
<div id="toast" role="status" aria-live="polite"></div>
<script src="/app.js"></script>
</body>
</html>

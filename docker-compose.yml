services:
  sysml-blocks:
    build: .
    # run an init (tini) as PID 1 so Ctrl-C and `docker stop` exit cleanly
    init: true
    ports:
      - "8080:8080"
    volumes:
      # Point this at your SysML v2 model folder — a git worktree,
      # or a synced OneDrive/SharePoint folder.
      - ./examples:/models
    environment:
      - PORT=8080
